<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InvestOS — 투자 인텔리전스</title>
<link rel="stylesheet" href="/static/style.css">
<script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

<!-- News Ticker -->
<div class="news-ticker" id="news-ticker">
  <div class="ticker-label">LIVE</div>
  <div class="ticker-track" id="ticker-track">
    <span class="ticker-text">뉴스 로딩 중...</span>
  </div>
</div>

<nav>
  <div class="logo">InvestOS</div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-category="geo">GEO</button>
    <button class="nav-tab" data-category="stock_us">US</button>
    <button class="nav-tab" data-category="stock_kr">KR</button>
  </div>
  <div class="updated" id="updated-at"></div>
</nav>

<div class="main">
  <!-- Left: Issue list + Entity list -->
  <div class="left-panel">
    <input type="text" class="search-box" id="search-box" placeholder="이슈·엔티티 검색...">

    <div class="panel-section">
      <div class="panel-title">이슈 순위</div>
      <div id="issue-list">
        <div class="empty-state">로딩 중...</div>
      </div>
    </div>

    <div class="panel-divider"></div>

    <div class="panel-section">
      <div class="panel-title">엔티티 목록</div>
      <div id="entity-list">
        <div class="empty-state">이슈를 선택하세요</div>
      </div>
    </div>
  </div>

  <!-- Center: Graph / Timeline toggle -->
  <div class="center-panel" id="center-panel">
    <div class="view-toggle">
      <button class="toggle-btn active" id="btn-graph" onclick="switchView('graph')">관계도</button>
      <button class="toggle-btn" id="btn-timeline" onclick="switchView('timeline')">타임라인</button>
      <button class="toggle-btn" id="btn-chart" onclick="switchView('chart')">차트</button>
      <button class="toggle-btn" id="btn-essence" onclick="switchView('essence')">Essence</button>
    </div>

    <!-- Graph view -->
    <div id="graph-container" class="view-container active">
      <div class="graph-toolbar" id="graph-toolbar" style="display:none;">
        <label>엔티티 수:
          <select id="graph-top-filter" onchange="reloadGraph()">
            <option value="10" selected>Top 10</option>
            <option value="20">Top 20</option>
            <option value="50">Top 50</option>
            <option value="0">전체</option>
          </select>
        </label>
        <label style="margin-left:10px;">깊이:
          <select id="graph-depth-filter" onchange="reloadGraph()">
            <option value="1">1차</option>
            <option value="2" selected>2차</option>
            <option value="3">3차</option>
          </select>
        </label>
        <span id="graph-count-label" class="graph-count"></span>
      </div>
      <div class="empty-state" id="graph-empty">이슈를 선택하면 관계도가 표시됩니다</div>
      <svg id="graph-svg" style="display:none;"></svg>
      <div class="graph-legend" style="display:none;" id="graph-legend">
        <div class="legend-item"><div class="legend-line" style="background:var(--blue);"></div> 동맹</div>
        <div class="legend-item"><div class="legend-line" style="background:var(--red);height:3px;"></div> 적대</div>
        <div class="legend-item"><div class="legend-line" style="background:var(--orange);border-top:1px dashed var(--orange);background:none;"></div> 프록시</div>
        <div class="legend-item"><div class="legend-line" style="background:var(--yellow);border-top:1px dashed var(--yellow);background:none;"></div> 무역</div>
        <div class="legend-item"><div class="legend-line" style="background:var(--green);border-top:1px dashed var(--green);background:none;"></div> 보급</div>
      </div>
    </div>

    <!-- Timeline view -->
    <div id="timeline-container" class="view-container" style="display:none;">
      <div class="timeline-scroll" id="timeline-scroll">
        <div class="empty-state">이슈를 선택하면 타임라인이 표시됩니다</div>
      </div>
    </div>

    <!-- Chart view (자체 차트: lightweight-charts + yfinance) -->
    <div id="chart-container" class="view-container" style="display:none;">
      <div class="chart-layout">
        <div class="chart-main">
          <div class="chart-toolbar">
            <span class="chart-symbol">TSLA</span>
            <div class="chart-period-btns">
              <button class="period-btn" data-period="1mo">1M</button>
              <button class="period-btn" data-period="3mo">3M</button>
              <button class="period-btn active" data-period="6mo">6M</button>
              <button class="period-btn" data-period="1y">1Y</button>
              <button class="period-btn" data-period="2y">2Y</button>
              <button class="period-btn" data-period="5y">5Y</button>
              <button class="period-btn" data-period="max">MAX</button>
            </div>
            <div class="chart-interval-btns">
              <button class="interval-btn" data-interval="1h">1H</button>
              <button class="interval-btn" data-interval="4h">4H</button>
              <button class="interval-btn active" data-interval="1d">D</button>
              <button class="interval-btn" data-interval="1wk">W</button>
              <button class="interval-btn" data-interval="1mo">M</button>
            </div>
            <button class="period-btn" id="btn-y-reset" title="Y축 자동맞춤 리셋">Y↕</button>
            <label class="chart-toggle">
              <input type="checkbox" id="show-sma" checked> 이평선
            </label>
            <label class="chart-toggle">
              <input type="checkbox" id="show-vwma" checked> VWMA
            </label>
            <label class="chart-toggle">
              <input type="checkbox" id="show-vpvr" checked> VP
            </label>
            <label class="chart-toggle">
              <input type="checkbox" id="show-events" checked> 이벤트
            </label>
            <label class="chart-toggle">
              <input type="checkbox" id="show-future-events" checked> 예정 이벤트
            </label>
            <select id="importance-level" class="chart-select">
              <option value="core">핵심(5)</option>
              <option value="important" selected>중요(15)</option>
              <option value="all">전체(50)</option>
            </select>
            <span id="chart-indicator-summary" class="chart-indicator-text"></span>
          </div>
          <div id="lw-main-chart" style="width:100%;flex:1;"></div>
          <div id="lw-rsi-chart" style="width:100%;height:100px;"></div>
          <div id="lw-macd-chart" style="width:100%;height:100px;"></div>
          <div id="chart-tooltip" class="chart-tooltip"></div>
        </div>
        <div class="chart-sidebar" id="chart-event-panel">
          <div class="chart-sidebar-header">이벤트 목록</div>
          <div id="chart-event-list" class="chart-event-list"></div>
        </div>
      </div>
    </div>

    <!-- Essence view -->
    <div id="essence-container" class="view-container" style="display:none;">
      <div id="essence-content" style="padding:20px;height:100%;overflow-y:auto;"></div>
    </div>
  </div>

  <!-- Right: Briefing -->
  <div class="right-panel">
    <div id="briefing-content">
      <div class="empty-state">노드를 클릭하면 브리핑이 표시됩니다</div>
    </div>
  </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script src="https://unpkg.com/lightweight-charts@4/dist/lightweight-charts.standalone.production.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
