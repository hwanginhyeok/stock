# --- Stock 엔티티 본질적 속성 스키마 ---
# 엔티티 타입별로 Ollama가 추출해야 할 핵심 속성 정의
# 온톨로지 원칙: "이 속성이 없으면 이 엔티티를 이해할 수 없다"
stock_entity_properties:
  company:
    essential:     # 없으면 기업이 아님
      - business_model    # 어떻게 돈을 버는가
      - moat              # 경쟁우위 원천 (switching_costs/network_effects/intangible_assets/cost_advantage/efficient_scale)
      - capital_allocation  # 자본 배분 방식
    propria:       # 본질에서 도출되지만 본질 자체는 아님
      - revenue_growth
      - margin
      - valuation
  institution:
    essential:
      - policy_objective   # 정책 목표
      - primary_tool       # 핵심 수단
      - mandate            # 법적 권한
    propria:
      - current_rate
      - balance_sheet_size
  sector:
    essential:
      - growth_driver      # 성장 동인
      - cyclicality        # cyclical/defensive/growth
      - value_chain_position  # 가치사슬 내 위치
    propria:
      - pe_ratio
      - market_cap
  asset:
    essential:
      - measurement_target  # 무엇을 측정하는가
      - signal_direction    # bullish/bearish/neutral
      - threshold           # 주요 임계값
    propria:
      - current_value
      - trend
  person:
    essential:
      - role               # 현재 역할
      - influence          # 무엇을 통제/결정하는가
    propria:
      - track_record

# --- Tesla 본질론 기반 속성 스키마 ---
# Tesla essence (to ti en einai): 수직통합 × 제1원칙 엔지니어링 × 청정에너지 미션 × 자율성+로봇 야망
tesla_essence:
  components:
    - vertical_integration    # 수직통합
    - first_principle_engineering  # 제1원칙 엔지니어링
    - clean_energy_mission    # 청정에너지 미션
    - autonomy_robotics       # 자율성 + 로봇 야망

tesla_entity_properties:
  tesla_product:
    essential:
      - category           # vehicle/energy/charging
      - first_principle_bet  # 어떤 제1원칙에 기반하는가
      - role_in_master_plan  # Master Plan 3에서의 역할
    propria:
      - unit_volume
      - asp
      - margin
      - production_ramp_rate
  tesla_capability:
    essential:
      - moat_type          # intangible_assets/network_effects/cost_advantage
      - inputs_required    # 데이터, 컴퓨트, 인재
      - output_function    # 산출 기능
    propria:
      - accuracy_metric
      - users
      - interventions_per_mile
  tesla_factory:
    essential:
      - production_mandate
      - vertical_scope
      - product_mix
    propria:
      - capacity
      - utilization
      - opex
      - workforce
  tesla_initiative:
    essential:
      - strategic_goal
      - timeline_horizon   # short/medium/long
      - essence_component  # 4대 본질 중 관련 항목
      - capital_required_range
    propria:
      - progress_pct
      - milestone_count
      - burn_rate

# --- Tesla 이슈 번호 프리픽스 ---
tesla_issue_prefixes:
  E: essence        # 본질 변화
  P: product
  C: capability
  F: factory
  I: initiative
  R: regulatory
  M: musk_statement  # Musk 발언

# --- 제1원칙 분석 설정 ---
first_principle_analysis:
  # 분석 대상 최소 조건
  min_article_count: 3        # 이벤트에 연결된 기사 최소 수
  min_severity: "moderate"    # 최소 심각도
  # Claude 모델 설정
  model: "claude-sonnet-4-6"
  max_tokens: 1500
  temperature: 0.3
